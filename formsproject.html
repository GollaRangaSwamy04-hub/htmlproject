<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms</title>
</head>
<body>
    <h1>
        Course Registration Form
    </h1>
    <form>
        <fieldset>
            <legend><h3>Personal Details</h3></legend>
        <table cellpadding="10">
            <tr>
                <td><label> First Name:</label></td>
                <td><input id="name" type="text" placeholder="ex:ranga" required></td>
            </tr>
            <tr>
                <td><label> surname:</label></td>
                <td><input id="name" type="text" placeholder="ex:Golla" required></td>
            </tr>
            <tr>
                <td><label> Mobile Number</label></td>
                <td><input type="tel"></td>
            </tr>
            <tr>
                <td><label> Email:</label></td>
                <td><input type="email" required></td>
            </tr>
            <tr>
                <td><label> Password:</label></td>
                <td><input type="password"></td>
            </tr>
            <tr>
                <td><label> Date Of Birth:</label></td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td><label> Conifrm Password:</label></td>
                <td><input type="password"></td>
            </tr>
            <tr>
                <td><label> Age:</label></td>
                <td><input type="number"></td>
            </tr>
            <tr>
                <td><label> Gender:</label></td>
                <td>
                    <input type="radio" name="gender">Male
                    <input type="radio" name="gender">Female
                    <input type="radio" name="gender">Others
                </td>
            </tr> 
            <tr>
                <td><label> Select Country:</label></td>
                <td>
                    <select>
                        <option value=""> India</option>
                        <option value="">Usa</option>
                        <option value="">Austraila</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label> Upload Picture:</label></td>
                <td><input type="file"></td>
            </tr>
            <tr>
                <td><button>Reset</button></td>
            </tr>
        </table>
        <br>
        <fieldset>
            <legend>Course Details</legend>
        <table cellpadding="10">
            <tr>
                <td><label> Select Course:</label></td>
                <td>
                    <select>
                        <option value="Java">java</option>
                        <option value="python">python</option>
                        <option value="aiml">AIML</option>
                    </select>
                </td>

            </tr>
            <tr>
                <td><label> Delivery Mode:</label></td>
                <td>
                    <input type="radio" name="Delivery Mode">online
                    <input type="radio" name="Delivery Mode">offline
                </td>
            </tr>
            <tr>
                <td><label> Institute Name:</label></td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td><label> Comments:</label></td>
                <td>
                    <textarea name="comments" rows="3" cols="15"></textarea>
                </td>
            </tr>
            <tr>
                <td><button>Submit</button></td>
            </tr>
        </table>
        </fieldset>
    </form> 
</body>
</html>
